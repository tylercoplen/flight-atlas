<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Atlas — Tyler Coplen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    padding: 24px;
  }
  #gate h1 { font-size: 1.4rem; letter-spacing: .04em; }
  #gate p  { font-size: .85rem; color: #8b949e; }
  .pw-box {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }
  #pw {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
  }
  #pw:focus { border-color: #58a6ff; }
  #enter-btn {
    background: #1f6feb;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: .9rem;
    padding: 10px 18px;
    cursor: pointer;
  }
  #enter-btn:hover { background: #388bfd; }
  #err { color: #f78166; font-size: .82rem; min-height: 1.2em; }
  #content { display: none; }
</style>
</head>
<body>

<div id="gate">
  <h1>✈ Flight Atlas</h1>
  <p>Tyler Coplen · C-17A Globemaster III</p>
  <div class="pw-box">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
    <button id="enter-btn" onclick="unlock()">Enter</button>
  </div>
  <div id="err"></div>
</div>

<div id="content"></div>

<script>
const HASH = "693dd827c6739b5af4888f9dea23bf2083b6b0e2f94fbf3de4a284739ac1184b";
const STORE_KEY = "flight_atlas_v1";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function unlock() {
  const pw = document.getElementById("pw").value;
  const h  = await sha256(pw);
  if (h === HASH) {
    localStorage.setItem(STORE_KEY, HASH);
    show();
  } else {
    document.getElementById("err").textContent = "Incorrect password.";
    document.getElementById("pw").focus();
  }
}

function show() {
  document.getElementById("gate").style.display    = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("content").innerHTML = DASHBOARD_HTML;
  // Re-run any inline scripts from the dashboard
  document.getElementById("content").querySelectorAll("script").forEach(old => {
    const s = document.createElement("script");
    if (old.src) { s.src = old.src; } else { s.textContent = old.textContent; }
    document.head.appendChild(s);
  });
}

// Auto-unlock if already authenticated on this device
if (localStorage.getItem(STORE_KEY) === HASH) show();

// Allow Enter key — script is at bottom of body so DOM is already ready
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});

// Dashboard HTML (injected at publish time)
