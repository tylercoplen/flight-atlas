<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Atlas — Tyler Coplen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }
  h1 { font-size: 1.4rem; letter-spacing: .04em; }
  p  { font-size: .85rem; color: #8b949e; }
  .row { display: flex; gap: 10px; width: 100%; }
  #pw {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
  }
  #pw:focus { border-color: #58a6ff; }
  button {
    background: #1f6feb;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: .9rem;
    padding: 10px 18px;
    cursor: pointer;
  }
  button:hover { background: #388bfd; }
  #err { color: #f78166; font-size: .82rem; min-height: 1.2em; }
</style>
</head>
<body>
<div class="wrap">
  <h1>✈ Flight Atlas</h1>
  <p>Tyler Coplen · C-17A Globemaster III</p>
  <div class="row">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="unlock()">Enter</button>
  </div>
  <div id="err"></div>
</div>

<script>
var HASH = "693dd827c6739b5af4888f9dea23bf2083b6b0e2f94fbf3de4a284739ac1184b";
var KEY  = "flight_atlas_v1";

function sha256(str) {
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str))
    .then(function(buf) {
      return Array.from(new Uint8Array(buf))
        .map(function(b) { return b.toString(16).padStart(2, "0"); })
        .join("");
    });
}

function unlock() {
  var pw = document.getElementById("pw").value;
  sha256(pw).then(function(h) {
    if (h === HASH) {
      localStorage.setItem(KEY, HASH);
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("err").textContent = "Incorrect password.";
      document.getElementById("pw").select();
    }
  });
}

document.getElementById("pw").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

// Auto-redirect if already authenticated
if (localStorage.getItem(KEY) === HASH) {
  window.location.href = "dashboard.html";
}
</script>
</body>
</html>
